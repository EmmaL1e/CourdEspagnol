<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Hola! - Apprenez l'Espagnol A1</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇪🇸</text></svg>">
</head>
<body>

    <div class="container">
        <header>
            <h1 id="main-title">¡Hola!</h1>
            <p id="main-subtitle">Testez votre espagnol niveau A1</p>
        </header>

        <!-- Home Screen -->
        <main id="home-screen" class="screen active fade-in">
            <p style="text-align:center; padding-bottom: 2rem; color: var(--text-muted);">Choisissez votre mode d'apprentissage</p>
            <div class="theme-grid" id="theme-grid">
                <!-- Theme cards will be injected here -->
                <div class="theme-card" id="all-themes-btn" style="background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none;">
                    <div class="icon">✨</div>
                    <h2>Tous les thèmes</h2>
                    <p>Mélange aléatoire de tout le vocabulaire</p>
                </div>
            </div>
        </main>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen fade-in">
            <div class="quiz-header">
                <button class="btn btn-secondary" onclick="app.showHomeScreen()">
                    <span>←</span> Retour
                </button>
                <div class="progress-container">
                    <div class="progress-bar" id="quiz-progress"></div>
                </div>
                <div id="quiz-counter">1/10</div>
            </div>

            <div class="quiz-card" id="quiz-card">
                <div class="question-label">Question <span id="current-q-num">1</span>/10</div>
                <div class="question-text" id="question-text">Pistolet</div>
                
                <div class="input-group">
                    <input type="text" autocomplete="off" class="quiz-input" id="quiz-input" placeholder="Réponse en espagnol...">
                </div>

                <div id="feedback" class="feedback-container">
                    <div id="feedback-message"></div>
                    <div id="mnemonic-text" class="mnemonic"></div>
                </div>

                <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
                    <button class="btn btn-secondary" id="pass-btn">Passer la question</button>
                    <button class="btn btn-primary" id="validate-btn">Valider</button>
                    <button class="btn btn-primary hidden" id="next-btn">Question suivante</button>
                </div>
            </div>
            
            <div id="quiz-stats" style="text-align: center; color: var(--text-muted);">
                Série de 10 questions aléatoires
            </div>
        </div>

        <!-- Revision Screen -->
        <div id="revision-screen" class="screen fade-in">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
                <button class="btn btn-secondary" onclick="app.showHomeScreen()">
                    <span>←</span> Retour
                </button>
                <h2 id="revision-title">Révisions</h2>
                <div style="width: 100px;"></div> <!-- Spacer -->
            </div>
            
            <div id="revision-content">
                <!-- Sub-theme sections will be injected here -->
            </div>
        </div>

        <!-- Mode Selection Modal -->
        <div class="mode-overlay" id="mode-overlay">
            <div class="mode-content">
                <h2 id="modal-theme-name">Nom du Thème</h2>
                <p style="margin-top: 1rem; color: var(--text-muted);" id="modal-theme-desc">Choisissez une activité</p>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="app.startQuiz()">🎯 Questionnaire (10 questions)</button>
                    <button class="btn btn-secondary" onclick="app.startRevision()">📚 Révisions (Flashcards)</button>
                    <button class="btn btn-secondary" style="border:none; margin-top:1rem;" onclick="app.hideModal()">Annuler</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
